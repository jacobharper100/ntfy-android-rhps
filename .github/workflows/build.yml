name: Build & Release Signed APK

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new upstream tag
        id: sync
        run: |
          git remote add upstream https://github.com/binwiederhier/ntfy-android.git
          git fetch upstream --tags

          LATEST_TAG=$(git tag --list --sort=-version:refname | grep -E '^v[0-9]' | head -1)
          UPSTREAM_TAG=$(git ls-remote --tags upstream \
            | awk '{print $2}' \
            | grep -E 'refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's|refs/tags/||' \
            | sort -V \
            | tail -1)

          echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT

          if [ "$LATEST_TAG" = "$UPSTREAM_TAG" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git checkout -b build-$UPSTREAM_TAG upstream/$UPSTREAM_TAG 2>/dev/null \
              || git checkout $UPSTREAM_TAG
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Nothing to do
        if: steps.sync.outputs.changed == 'false'
        run: |
          echo "Fork is already up to date with upstream tag ${{ steps.sync.outputs.upstream_tag }}. Nothing to build."
          
      - name: Set up JDK
        if: steps.sync.outputs.changed == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inject google-services.json
        if: steps.sync.outputs.changed == 'true'
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Patch base URL
        if: steps.sync.outputs.changed == 'true'
        run: |
          sed -i 's|<string name="app_base_url">.*</string>|<string name="app_base_url">${{ secrets.APP_BASE_URL }}</string>|' \
            app/src/main/res/values/values.xml

      - name: Build APK
        if: steps.sync.outputs.changed == 'true'
        run: ./gradlew assemblePlayRelease

      - name: Set up Android build-tools
        if: steps.sync.outputs.changed == 'true'
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools
          LATEST=$(ls -v "$BUILD_TOOLS" | tail -1)
          echo "$BUILD_TOOLS/$LATEST" >> $GITHUB_PATH

      - name: Sign APK
        if: steps.sync.outputs.changed == 'true'
        run: |
          VERSION=$(grep "versionName" app/build.gradle | head -1 | grep -oP '"\K[^"]+')
          APK_NAME="ntfy-rhps-${VERSION}-play-release.apk"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > release.keystore
          apksigner sign \
            --ks release.keystore \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out "$APK_NAME" \
            app/build/outputs/apk/play/release/app-play-release-unsigned.apk
          rm release.keystore
        id: sign

      - name: Create GitHub Release
        if: steps.sync.outputs.changed == 'true'
        run: |
          TAG="${{ steps.sync.outputs.upstream_tag }}"
          APK_NAME="${{ steps.sign.outputs.apk_name }}"

          UPSTREAM_NOTES=$(gh release view "$TAG" \
            --repo binwiederhier/ntfy-android \
            --json body -q .body 2>/dev/null || echo "")

          NOTES=$(printf '> Built with custom FCM configuration for ntfy.rhps.dev\n\n%s' "$UPSTREAM_NOTES")

          gh release create "$TAG" "$APK_NAME" \
            --repo ${{ github.repository }} \
            --title "$TAG"\
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}